<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Classmates List</title>

<style>
    body {
        font-family: 'Nunito', sans-serif;
        background: linear-gradient(135deg, #fdfcff, #f3f6ff, #fef6fb);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .card{
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(18px);
        padding: 42px;
        width: 520px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        border: 1px solid rgba(255,255,255,0.8);
    }

    h2{
        margin-bottom: 10px;
        font-weight: 800;
        font-size: 34px;
        color: #505050;
        letter-spacing: 0.5px;
    }

    p{
        margin-bottom: 30px;
        color: #8c8c8c;
        font-size: 14px;
        letter-spacing: 0.3px;
    }

    input{
        width: 100%;
        padding: 15px;
        margin-bottom: 18px;
        border-radius: 16px;
        border: 1px solid rgba(0,0,0,0.07);
        background: rgba(255,255,255,0.88);
        outline: none;
        transition: 0.25s ease;
        box-sizing: border-box;
        font-size: 15px;
        font-family: 'Nunito', sans-serif;
        color: #555;
    }

    input::placeholder{
        color: #b0b0b0;
    }

    input:focus{
        border-color: #c1cbff;
        box-shadow: 0 0 0 4px rgba(193,203,255,0.25);
    }

    .classmates-btn {
        padding: 14px 20px;
        width: 100%;
        border-radius: 16px;
        border: none;
        font-weight: 700;
        font-size: 15px;
        color: white;
        cursor: pointer;
        background: linear-gradient(135deg, #bcc8ff, #92a8ff);
        margin-bottom: 15px;
        transition: 0.3s ease;
        box-shadow: 0 10px 20px rgba(146,168,255,0.28);
        font-family: 'Nunito', sans-serif;
    }

    .classmates-btn:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 14px 28px rgba(146,168,255,0.38);
    }

    #classmateOutput{
        display: none;
        margin-top: 25px;
        border-radius: 20px;
        min-height: 260px;
        max-height: 260px;
        overflow-y: auto;
        padding: 24px;
        text-align: left;
        background: rgba(255,255,255,0.78);
        border: 1px solid rgba(0,0,0,0.05);
        color: #666;
        font-family: 'Nunito', sans-serif;
        font-size: 15px;
        line-height: 2.1;
        letter-spacing: 0.4px;
        box-shadow:  inset 0 1px 8px rgba(255,255,255,0.6), 0 4px 12px rgba(0,0,0,0.03);
    }

    #classmateOutput div{
        padding: 14px 16px;
        margin-bottom: 12px;
        border-radius: 14px;
        background: rgba(245,247,255,0.75);
        border: 1px solid rgba(210,220,255,0.4);
        transition: 0.2s ease;
    }

    #classmateOutput div:hover{
        transform: scale(1.01);
        background: rgba(240,244,255,0.95);
    }

    #classmateOutput strong{
        color: #7d92ff;
        font-weight: 800;
    }

    #classmateOutput::-webkit-scrollbar {
        width: 8px;
    }

    #classmateOutput::-webkit-scrollbar-thumb {
        background: rgba(180, 190, 255, 0.55);
        border-radius: 10px;
    }
</style>
</head>

<body>

    <!-- Main card container holding the entire classmates app -->
    <div class="card">

        <!-- Page title -->
        <h2>Classmates List</h2>

        <!-- Short description/instructions -->
        <p>Add and view your classmates easily.</p>

        <!-- Input field for entering classmate name -->
        <input type="text" id="name" placeholder="Enter classmate's name">

        <!-- Input field for entering class section -->
        <input type="text" id="section" placeholder="Enter section">

        <!-- Input field for entering favorite subject -->
        <input type="text" id="favoriteSubject" placeholder="Enter favorite subject">

        <!-- Button triggers Python function to add a classmate -->
        <button class="classmates-btn" py-click="addClassmate">
            Add Classmate
        </button>

        <!-- Button triggers Python function to display the classmates list -->
        <button class="classmates-btn" py-click="displayClassmates">
            Show List
        </button>

        <!-- Output box where the classmates list appears -->
        <div id="classmateOutput"></div>

    </div>

    <!-- Connects external Python file (main.py) using PyScript -->
    <script type="py" src="main.py"></script>

</body>
</html>
