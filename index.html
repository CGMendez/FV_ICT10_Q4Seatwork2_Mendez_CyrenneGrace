<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Classmates List</title>

<style>
    body {
        font-family: Nunito, sans-serif;
        background: linear-gradient(to right, #ffe8a9, #ff5151, #60ffa2, #57a0ff);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
    }

    .navbar{
        background-color: #6890e7;
        font-size: 20px;
        border-radius: 15px;
        padding: 15px 30px;
        width: 60%;
        margin-top: 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0px 6px 12px rgba(255, 255, 255, 0.334);
    }

    .navbar-brand{
        color: white;
        font-weight: bold;
        font-size: 24px;
    }

    .navbar a{
        color: white;
        text-decoration: none;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 8px;
    }

    .navbar a:hover{
        background-color: rgba(255, 255, 255, 0.2);
    }

    .card{
        background: white;
        padding: 35px;
        width: 500px;
        border-radius: 20px;
        border: solid black;
        margin-top: 60px;
        text-align: center;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.25);
    }

    h2{
        margin-bottom: 20px;
        font-weight: bold;
    }

    .players-btn {
        padding: 10px 20px;
        width: 100%;
        border-radius: 10px;
        border: none;
        font-weight: bold;
        color: white;
        text-shadow: #ffffff 1px 1px 2px;
        cursor: pointer;
        background-color: #6890e7;
        margin-bottom: 20px;
    }

    .players-btn:hover {
        transform: scale(1.03);
    }

    #playerOutput{
        margin-top: 15px;
        border: 2px solid black;
        border-radius: 10px;
        height: 260px;
        overflow-y: auto;
        padding: 10px;
        text-align: left;
        font-size: 15px;
        background-color: #f8f8f8;
    }
</style>
</head>

<body>

    <!-- Navigation bar -->
    <nav class="navbar">

        <!-- System title -->
        <div class="navbar-brand">Classmates List</div>

        <!-- Navigation links -->
        <div>
            <!-- Link to sign up page -->
            <a href="#">Classmate List</a>

            <!-- Link to team checker page -->
            <a href="#">Attendance Tracker</a>

            <!-- Link to players list page (current page) -->
            <a href="#">Photos</a>
        </div>
    </nav>

    <!-- Main container card -->
    <div class="card">

        <!-- Section title -->
        <h2>Classmates List</h2>
        <p style="font-size: 14px; color: gray;">Add and view your classmates easily.</p>

        <input type="text" id="name" placeholder="Enter classmate's name" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc;">
        <input type="text" id="section" placeholder="Enter section" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc;">
        <input type="text" id="favoriteSubject" placeholder="Enter favorite subject" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc;">

        <!-- Button that triggers the Python function "showClassmates" -->
        <button class="players-btn" py-click="addClassmate">Add Classmate</button>
        <button class="players-btn" py-click="displayClassmates">Show List</button>

        <!-- Output container where the list will be displayed -->
        <div id="playerOutput"></div>
    </div>

    <!-- Links the external Python file -->
    <script type="py" src="main.py"></script>

</body>
</html>
